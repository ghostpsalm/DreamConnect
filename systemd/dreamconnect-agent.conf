# systemd drop-in for the ScreenConnect client unit
# (connectwisecontrol-<id>.service). Installed by install.sh at
#   /etc/systemd/system/connectwisecontrol-<id>.service.d/dreamconnect.conf
#
# The client is launched by init.d as a plain `java …` command inheriting this
# unit's environment, so JAVA_TOOL_OPTIONS is picked up automatically and loads
# the agent. The agent then swaps java.awt.Robot's peer onto the Wayland bridge.
#
# @UID@ is substituted by install.sh with the desktop user's uid, so the root
# JVM finds the (user-owned) daemon socket. The shared-memory frame path is the
# daemon default and is world-readable.
[Service]
Environment=JAVA_TOOL_OPTIONS=-javaagent:@INSTALL_DIR@/dreamconnect-agent.jar=socket=/run/user/@UID@/dreamconnect.sock,shm=/dev/shm/dreamconnect.frame
